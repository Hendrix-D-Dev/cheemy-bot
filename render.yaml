services:
  - type: web
    name: cheemy-bot
    runtime: node
    repo: https://github.com/YOUR_USERNAME/YOUR_REPO
    plan: free
    envVars:
      - key: NODE_VERSION
        value: 18
      - key: BOT_NUMBER
        value: 09043650490
      - key: PREFIX
        value: .
      - key: ADMIN_NUMBERS
        value: 09043650490
    buildCommand: npm install
    startCommand: npm start
    healthCheckPath: /health
    autoDeploy: true

cron:
  - name: keep-bot-alive
    schedule: "*/10 * * * *" # Every 10 minutes
    command: curl -I https://YOUR_APP.onrender.com/ping